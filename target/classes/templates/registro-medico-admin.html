<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Registrar Médico o Administrador</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
        body {
            background: linear-gradient(to right, #e0f7fa, #e1f5fe);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .form-container {
            background: #ffffff;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 105, 92, 0.15);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            color: #00695c;
            text-align: center;
            margin-bottom: 25px;
            font-weight: 700;
        }
        label {
            font-weight: 600;
            color: #004d40;
        }
        .form-control:focus {
            border-color: #00796b;
            box-shadow: 0 0 8px rgba(0, 121, 107, 0.3);
        }
        select.form-select {
            border-color: #00796b;
        }
        button.btn-submit {
            background-color: #00796b;
            color: white;
            font-weight: 600;
            width: 100%;
            border-radius: 30px;
            padding: 10px;
            transition: background-color 0.3s ease;
        }
        button.btn-submit:hover {
            background-color: #004d40;
        }
        a.back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #00796b;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        a.back-link:hover {
            color: #004d40;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Registrar Usuario (Admin o Médico)</h2>
        <form th:action="@{/registro/medico-admin}" method="post" th:object="${usuario}">
            <div class="mb-3">
                <label for="firstName" class="form-label">Nombre:</label>
                <input
                  type="text"
                  id="firstName"
                  th:field="*{firstName}"
                  class="form-control"
                  required
                />
            </div>

            <div class="mb-3">
                <label for="lastName" class="form-label">Apellido:</label>
                <input
                  type="text"
                  id="lastName"
                  th:field="*{lastName}"
                  class="form-control"
                  required
                />
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Correo Electrónico:</label>
                <input
                  type="email"
                  id="email"
                  th:field="*{email}"
                  class="form-control"
                  required
                />
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Contraseña:</label>
                <input
                  type="password"
                  id="password"
                  th:field="*{password}"
                  class="form-control"
                  required
                />
            </div>

            <div class="mb-4">
                <label for="selectedRole" class="form-label">Rol:</label>
                <select
                  id="selectedRole"
                  th:field="*{selectedRole}"
                  class="form-select"
                  required
                >
                    <option value="" disabled selected>Seleccione un rol</option>
                    <option th:value="ROLE_ADMIN">ADMIN</option>
                    <option th:value="ROLE_MEDICO">MÉDICO</option>
                </select>
            </div>

            <button type="submit" class="btn btn-submit">
                Registrar	
            </button>
        </form>

        <a th:href="@{/login}" class="back-link">← Volver al Login</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
