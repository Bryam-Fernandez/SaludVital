<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle de Cita</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Detalle de Cita #<span th:text="${cita.id}"></span></h1>
            <a th:href="@{/citas/mis-citas}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Volver a mis citas
            </a>
        </div>
        
        <div class="card">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <h5 class="card-title mb-3">Información de la Cita</h5>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Paciente:</label>
                            <p th:text="${cita.paciente.nombre + ' ' + cita.paciente.apellido}"></p>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Médico:</label>
                            <p th:text="${cita.medico.nombre + ' ' + cita.medico.apellido}"></p>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Especialidad:</label>
                            <p th:text="${cita.medico.especialidad ?: 'Médico General'}"></p>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <h5 class="card-title mb-3">Detalles</h5>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Fecha:</label>
                            <p th:text="${#temporals.format(cita.fechaHora, 'dd/MM/yyyy')}"></p>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Hora:</label>
                            <p th:text="${#temporals.format(cita.fechaHora, 'HH:mm')}"></p>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Estado:</label>
                            <span th:if="${cita.estado == 'CONFIRMADA'}" class="badge bg-success">
                                Confirmada
                            </span>
                            <span th:if="${cita.estado == 'PROGRAMADA'}" class="badge bg-warning text-dark">
                                Programada
                            </span>
                            <span th:if="${cita.estado == 'PENDIENTE'}" class="badge bg-info">
                                Pendiente
                            </span>
                            <span th:if="${cita.estado == 'CANCELADA'}" class="badge bg-danger">
                                Cancelada
                            </span>
                            <span th:if="${cita.estado == 'COMPLETADA'}" class="badge bg-secondary">
                                Completada
                            </span>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Tarifa:</label>
                            <p th:text="${'$' + cita.tarifaAplicada}"></p>
                        </div>
                    </div>
                </div>
                
                <div class="row mt-4">
                    <div class="col-12">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Motivo de la consulta:</label>
                            <p th:text="${cita.motivo}"></p>
                        </div>
                        
                        <div th:if="${cita.notas != null && !cita.notas.isEmpty()}" class="mb-3">
                            <label class="form-label fw-bold">Notas adicionales:</label>
                            <p th:text="${cita.notas}"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
