<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mis Recetas - Panel Médico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" th:href="@{/medico/panel}">
                <i class="fas fa-arrow-left"></i> Volver al Panel
            </a>
            <span class="navbar-text text-white">
                <i class="fas fa-prescription"></i> Mis Recetas Médicas
            </span>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Estadísticas -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card text-white bg-primary">
                    <div class="card-body text-center">
                        <h2 th:text="${total}">0</h2>
                        <p>Total Recetas</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-success">
                    <div class="card-body text-center">
                        <h2 th:text="${activas}">0</h2>
                        <p>Recetas Activas</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-warning">
                    <div class="card-body text-center">
                        <h2 th:text="${vencidas}">0</h2>
                        <p>Recetas Vencidas</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filtros -->
        <div class="card mb-4">
            <div class="card-body">
                <form method="get" action="" class="row g-3">
                    <div class="col-md-6">
                        <select name="estado" class="form-select">
                            <option value="">Todos los estados</option>
                            <option th:each="estadoItem : ${estadosReceta}" 
                                    th:value="${estadoItem}" 
                                    th:text="${estadoItem}"
                                    th:selected="${estado == estadoItem}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-filter"></i> Filtrar
                        </button>
                    </div>
                    <div class="col-md-3">
                        <a th:href="@{/recetas/medico}" class="btn btn-outline-secondary w-100">
                            <i class="fas fa-times"></i> Limpiar
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <!-- Lista de recetas -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">
                    <i class="fas fa-list"></i> Lista de Recetas
                </h5>
                <a th:href="@{/recetas/nueva}" class="btn btn-success">
                    <i class="fas fa-plus"></i> Nueva Receta
                </a>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Número</th>
                                <th>Paciente</th>
                                <th>Fecha Emisión</th>
                                <th>Válida hasta</th>
                                <th>Medicamentos</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${recetas.isEmpty()}">
                                <td colspan="7" class="text-center py-4">
                                    <i class="fas fa-prescription-bottle fa-2x text-muted"></i>
                                    <p class="mt-2">No hay recetas registradas</p>
                                </td>
                            </tr>
                            <tr th:each="receta : ${recetas}">
                                <td>
                                    <strong th:text="${receta.numeroReceta}"></strong>
                                </td>
                                <td>
                                    <span th:text="${receta.paciente.nombre + ' ' + receta.paciente.apellido}"></span>
                                    <br>
                                    <small th:text="${receta.paciente.numeroIdentificacion}" class="text-muted"></small>
                                </td>
                                <td>
                                    <span th:text="${#temporals.format(receta.fechaEmision, 'dd/MM/yyyy')}"></span>
                                </td>
                                <td>
                                    <span th:text="${#temporals.format(receta.fechaCaducidad, 'dd/MM/yyyy')}"></span>
                                </td>
                                <td>
                                    <span th:text="${receta.items != null ? receta.items.size() : 0}"></span> medicamentos
                                </td>
                                <td>
                                    <span th:switch="${receta.estado}" class="badge">
                                        <span th:case="ACTIVA" class="bg-success">Activa</span>
                                        <span th:case="DISPENSADA" class="bg-info">Dispensada</span>
                                        <span th:case="COMPLETADA" class="bg-secondary">Completada</span>
                                        <span th:case="VENCIDA" class="bg-warning">Vencida</span>
                                        <span th:case="CANCELADA" class="bg-danger">Cancelada</span>
                                    </span>
                                </td>
                                <td>
                                    <a th:href="@{'/recetas/' + ${receta.id}}" class="btn btn-sm btn-primary">
                                        <i class="fas fa-eye"></i>
                                    </a>
                                    <button class="btn btn-sm btn-success" 
                                            th:if="${receta.estado.name() == 'ACTIVA'}"
                                            th:onclick="'marcarComoDispensada(' + ${receta.id} + ')'">
                                        <i class="fas fa-check"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function marcarComoDispensada(recetaId) {
            if (confirm('¿Marcar esta receta como dispensada?')) {
                window.location.href = `/recetas/${recetaId}/dispensar`;
            }
        }
    </script>
</body>
</html>
