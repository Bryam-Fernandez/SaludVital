<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Receta - Panel Médico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .medicamento-item {
            border: 1px solid #dee2e6;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #f8f9fa;
        }
        .remove-medicamento {
            cursor: pointer;
            color: #dc3545;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" th:href="@{/recetas/medico/recetas}">
                <i class="fas fa-arrow-left"></i> Volver a Recetas
            </a>
            <span class="navbar-text text-white">
                <i class="fas fa-prescription"></i> Nueva Receta Médica
            </span>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <!-- Mensajes Flash -->
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fas fa-check-circle"></i>
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-circle"></i>
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">
                            <i class="fas fa-file-medical"></i> Crear Nueva Receta
                        </h5>
                    </div>
                    
                    <!-- FORMULARIO CON NOMBRES CORRECTOS PARA ItemRecetaDTO -->
                    <form th:action="@{/recetas/guardar}" method="post" id="formReceta">
                        <div class="card-body">
                            <!-- Información del Médico (oculta) -->
                            <input type="hidden" name="medicoId" th:value="${medico.id}" />
                            
                            <!-- Información del Paciente -->
                            <div class="card mb-4">
                                <div class="card-header bg-light">
                                    <h6 class="mb-0"><i class="fas fa-user-injured"></i> Datos del Paciente</h6>
                                </div>
                                <div class="card-body">
                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label for="pacienteId" class="form-label">Seleccionar Paciente *</label>
                                            <select id="pacienteId" name="pacienteId" class="form-select" required>
                                                <option value="">-- Seleccione un paciente --</option>
                                                <option th:each="paciente : ${pacientes}" 
                                                        th:value="${paciente.id}"
                                                        th:text="${paciente.nombre + ' ' + paciente.apellido + ' - ' + paciente.numeroIdentificacion}">
                                                </option>
                                            </select>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label for="instruccionesGenerales" class="form-label">Instrucciones Generales</label>
                                            <textarea id="instruccionesGenerales" name="instruccionesGenerales" 
                                                      class="form-control" rows="3" 
                                                      placeholder="Instrucciones generales para el paciente..."></textarea>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Medicamentos -->
                            <div class="card mb-4">
                                <div class="card-header bg-light d-flex justify-content-between align-items-center">
                                    <h6 class="mb-0"><i class="fas fa-pills"></i> Medicamentos</h6>
                                    <button type="button" class="btn btn-sm btn-primary" onclick="agregarMedicamento()">
                                        <i class="fas fa-plus"></i> Agregar Medicamento
                                    </button>
                                </div>
                                <div class="card-body">
                                    <div id="medicamentos-container">
                                        <!-- Primer medicamento - NOMBRES SEGÚN ItemRecetaDTO -->
                                        <div class="medicamento-item" id="medicamento-0">
                                            <div class="row">
                                                <div class="col-md-3 mb-3">
                                                    <label class="form-label">Medicamento *</label>
                                                    <select name="items[0].medicamento" class="form-select medicamento-select" required>
                                                        <option value="">-- Seleccionar medicamento --</option>
                                                        <option th:each="med : ${medicamentosComunes}" 
                                                                th:value="${med}"
                                                                th:text="${med}">
                                                        </option>
                                                        <option value="OTRO">OTRO (especificar)</option>
                                                    </select>
                                                </div>
                                                <div class="col-md-2 mb-3">
                                                    <label class="form-label">Cantidad *</label>
                                                    <input type="number" name="items[0].cantidadTotal" 
                                                           class="form-control medicamento-cantidad" min="1" value="1" required>
                                                </div>
                                                <div class="col-md-2 mb-3">
                                                    <label class="form-label">Dosis</label>
                                                    <input type="text" name="items[0].dosis" 
                                                           class="form-control" 
                                                           placeholder="Ej: 500mg">
                                                </div>
                                                <div class="col-md-2 mb-3">
                                                    <label class="form-label">Frecuencia</label>
                                                    <input type="text" name="items[0].frecuencia" 
                                                           class="form-control" 
                                                           placeholder="Ej: Cada 8 horas">
                                                </div>
                                                <div class="col-md-2 mb-3">
                                                    <label class="form-label">Indicaciones *</label>
                                                    <input type="text" name="items[0].indicaciones" 
                                                           class="form-control medicamento-indicaciones" 
                                                           placeholder="Ej: Tomar con comida" required>
                                                </div>
                                                <div class="col-md-1 mb-3 d-flex align-items-end">
                                                    <button type="button" class="btn btn-danger remove-medicamento" onclick="removerMedicamento(this)" disabled>
                                                        <i class="fas fa-trash"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Validez de la receta -->
                            <div class="card mb-4">
                                <div class="card-header bg-light">
                                    <h6 class="mb-0"><i class="fas fa-calendar-alt"></i> Validez de la Receta</h6>
                                </div>
                                <div class="card-body">
                                    <div class="row">
                                        <div class="col-md-4 mb-3">
                                            <label class="form-label">Fecha Emisión *</label>
                                            <input type="date" id="fechaEmision" name="fechaEmision" 
                                                   class="form-control" required
                                                   th:value="${#temporals.format(#temporals.createToday(), 'yyyy-MM-dd')}">
                                        </div>
                                        <div class="col-md-4 mb-3">
                                            <label class="form-label">Fecha Caducidad *</label>
                                            <input type="date" id="fechaCaducidad" name="fechaCaducidad" 
                                                   class="form-control" required>
                                        </div>
                                        <div class="col-md-4 mb-3 d-flex align-items-end">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="electronica" name="electronica" value="true">
                                                <label class="form-check-label" for="electronica">
                                                    Receta Electrónica
                                                </label>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="card-footer text-end">
                            <a th:href="@{/recetas/medico/recetas}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Cancelar
                            </a>
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-save"></i> Guardar Receta
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let medicamentoCount = 1;
        
        // Inicializar fechas al cargar la página
        document.addEventListener('DOMContentLoaded', function() {
            // Establecer fecha de emisión (hoy) ya está en Thymeleaf
            
            // Establecer fecha de caducidad (30 días después)
            const hoy = new Date();
            const treintaDias = new Date(hoy);
            treintaDias.setDate(treintaDias.getDate() + 30);
            const fechaCaducidad = document.getElementById('fechaCaducidad');
            if (!fechaCaducidad.value) {
                fechaCaducidad.value = formatDateForInput(treintaDias);
            }
            
            // Asegurar que el primer medicamento tenga valores por defecto
            const primerSelect = document.querySelector('.medicamento-select');
            if (primerSelect && primerSelect.value === '' && primerSelect.options.length > 1) {
                primerSelect.value = primerSelect.options[1].value;
            }
            
            const primerIndicaciones = document.querySelector('.medicamento-indicaciones');
            if (primerIndicaciones && !primerIndicaciones.value) {
                primerIndicaciones.value = 'Tomar según indicaciones del médico';
            }
        });
        
        // Formatear fecha para input type="date" (yyyy-MM-dd)
        function formatDateForInput(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
        
        function agregarMedicamento() {
            const container = document.getElementById('medicamentos-container');
            
            const newMedicamento = document.createElement('div');
            newMedicamento.className = 'medicamento-item';
            newMedicamento.id = 'medicamento-' + medicamentoCount;
            
            newMedicamento.innerHTML = `
                <div class="row">
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Medicamento *</label>
                        <select name="items[${medicamentoCount}].medicamento" class="form-select medicamento-select" required>
                            <option value="">-- Seleccionar medicamento --</option>
                            <option th:each="med : ${medicamentosComunes}" 
                                    th:value="${med}"
                                    th:text="${med}">
                            </option>
                            <option value="OTRO">OTRO (especificar)</option>
                        </select>
                    </div>
                    <div class="col-md-2 mb-3">
                        <label class="form-label">Cantidad *</label>
                        <input type="number" name="items[${medicamentoCount}].cantidadTotal" 
                               class="form-control medicamento-cantidad" min="1" value="1" required>
                    </div>
                    <div class="col-md-2 mb-3">
                        <label class="form-label">Dosis</label>
                        <input type="text" name="items[${medicamentoCount}].dosis" 
                               class="form-control" 
                               placeholder="Ej: 500mg">
                    </div>
                    <div class="col-md-2 mb-3">
                        <label class="form-label">Frecuencia</label>
                        <input type="text" name="items[${medicamentoCount}].frecuencia" 
                               class="form-control" 
                               placeholder="Ej: Cada 8 horas">
                    </div>
                    <div class="col-md-2 mb-3">
                        <label class="form-label">Indicaciones *</label>
                        <input type="text" name="items[${medicamentoCount}].indicaciones" 
                               class="form-control medicamento-indicaciones" 
                               placeholder="Ej: Tomar con comida" required>
                    </div>
                    <div class="col-md-1 mb-3 d-flex align-items-end">
                        <button type="button" class="btn btn-danger remove-medicamento" onclick="removerMedicamento(this)">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `;
            
            container.appendChild(newMedicamento);
            medicamentoCount++;
            
            // Seleccionar automáticamente el primer medicamento en el nuevo select
            const newSelect = newMedicamento.querySelector('.medicamento-select');
            if (newSelect && newSelect.value === '' && newSelect.options.length > 1) {
                newSelect.value = newSelect.options[1].value;
            }
            
            // Poner indicaciones por defecto
            const newIndicaciones = newMedicamento.querySelector('.medicamento-indicaciones');
            if (newIndicaciones && !newIndicaciones.value) {
                newIndicaciones.value = 'Tomar según indicaciones del médico';
            }
        }
        
        function removerMedicamento(button) {
            const medicamentoItem = button.closest('.medicamento-item');
            if (medicamentoItem && medicamentoItem.id !== 'medicamento-0') {
                medicamentoItem.remove();
            }
        }
    </script>
</body>
</html>
